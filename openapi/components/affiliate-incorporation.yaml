---
schemas:
  AffiliatePublicError:
    type: object
    required:
      - statusCode
      - message
      - error
    properties:
      statusCode:
        type: integer
        example: 403
      message:
        oneOf:
          - type: string
          - type: array
            items:
              type: string
        example: Company does not belong to this affiliate firm
      error:
        type: string
        example: Forbidden
  AffiliateCreateCompanyRequest:
    type: object
    required:
      - email
    properties:
      email:
        type: string
        format: email
        description: Email address for the new company owner.
        example: founder@example.com
      name:
        type: string
        description: Optional display name used when creating a new company.
        example: Acme Holdings
  AffiliateCreateCompanyResponse:
    type: object
    required:
      - companyId
    properties:
      companyId:
        type: integer
        description: Internal Commenda company identifier.
        example: 77
  AffiliateServiceCatalog:
    type: string
    description: Incorporation service types currently supported by the legacy affiliate API.
    enum:
      - US_CCORP_INCORPORATION
      - US_LLC_INCORPORATION
      - CA_CORP_INCORPORATION
      - INDIA_PVT_LTD_INCORPORATION
      - INDIA_LLP_INCORPORATION
      - UAE_INCORPORATION
      - UK_INCORPORATION
      - IE_INCORPORATION
      - SG_INCORPORATION
  AffiliateCreateServiceRequest:
    type: object
    required:
      - companyId
      - serviceType
    properties:
      companyId:
        type: integer
        description: Company that the new incorporation service should be attached to.
        example: 77
      serviceType:
        $ref: "./affiliate-incorporation.yaml#/schemas/AffiliateServiceCatalog"
  AffiliateCreateServiceResponse:
    type: object
    required:
      - paymentIntentId
    properties:
      paymentIntentId:
        type: string
        description: Identifier for the newly created payment intent that anchors the current public flow.
        example: pi_123
  AffiliatePaymentIntentStatus:
    type: string
    enum:
      - PENDING
      - COLLECTED
  AffiliatePaymentIntent:
    type: object
    required:
      - paymentIntentId
      - serviceRequestURL
    properties:
      paymentIntentId:
        type: string
        example: pi_123
      serviceRequestURL:
        type: string
        nullable: true
        description: App URL for the linked service request, if one exists.
        example: https://app.commenda.io/service-request/sr_123
  AffiliateListPaymentIntentsResponse:
    type: object
    required:
      - paymentIntents
    properties:
      paymentIntents:
        type: array
        items:
          $ref: "./affiliate-incorporation.yaml#/schemas/AffiliatePaymentIntent"
  AffiliateServiceRequestStep:
    type: object
    required:
      - name
      - status
      - createdAt
      - lastUpdatedAt
    properties:
      name:
        type: string
        example: Formation documents
      status:
        type: string
        enum:
          - NOT_STARTED
          - IN_PROGRESS
          - COMPLETED
          - ISSUE_REPORTED
      createdAt:
        type: string
        format: date-time
        example: 2026-03-01T00:00:00.000Z
      lastUpdatedAt:
        type: string
        format: date-time
        example: 2026-03-02T00:00:00.000Z
  AffiliateServiceRequest:
    type: object
    required:
      - id
      - corporationId
      - companyLegalName
      - steps
    properties:
      id:
        type: string
        example: sr_123
      corporationId:
        type: integer
        nullable: true
        example: 44
      companyLegalName:
        type: string
        nullable: true
        example: Acme LLC
      steps:
        type: array
        items:
          $ref: "./affiliate-incorporation.yaml#/schemas/AffiliateServiceRequestStep"
  AffiliatePaymentIntentServiceStatusResponse:
    type: object
    required:
      - paymentIntentId
      - service
    properties:
      paymentIntentId:
        type: string
        example: pi_123
      service:
        $ref: "./affiliate-incorporation.yaml#/schemas/AffiliateServiceRequest"
  AffiliateDocumentCategory:
    type: string
    enum:
      - FORMATION_DOCUMENT
      - SHAREHOLDER_DOCUMENT
      - TAX_AND_COMPLIANCE_DOCUMENT
      - FINANCIAL_RECORDS
      - OFFICE_AND_ADMINISTRATION_DOCUMENT
      - CONTRACTS_AND_AGREEMENTS
      - MISCELLANEOUS
  AffiliateDocument:
    type: object
    required:
      - fileId
      - documentName
      - documentType
      - documentSubType
      - country
      - jurisdiction
      - corporationType
      - corporationId
    properties:
      fileId:
        type: integer
        nullable: true
        description: Latest uploaded file id for this document slot, if available.
        example: 900
      documentName:
        type: string
        example: Operating Agreement
      documentType:
        $ref: "./affiliate-incorporation.yaml#/schemas/AffiliateDocumentCategory"
      documentSubType:
        type: string
        description: Legacy Commenda document subtype used internally for document rules and files.
        example: OperatingAgreement
      country:
        type: string
        example: US
      jurisdiction:
        type: string
        nullable: true
        example: DE
      corporationType:
        type: string
        nullable: true
        example: LLC
      corporationId:
        type: integer
        example: 44
  AffiliateListDocumentsResponse:
    type: object
    required:
      - documents
      - count
    properties:
      documents:
        type: array
        items:
          $ref: "./affiliate-incorporation.yaml#/schemas/AffiliateDocument"
      count:
        type: integer
        example: 2
  AffiliateFileSignedUrlResponse:
    type: object
    required:
      - signedUrl
    properties:
      signedUrl:
        type: string
        format: uri
        description: Temporary signed download URL for the file.
        example: https://bucket.s3.amazonaws.com/file.pdf?X-Amz-Signature=example
  PartnerIncorporationCountry:
    type: string
    description: ISO 3166-1 alpha-2 country code for the incorporation jurisdiction.
    enum:
      - AE
      - CA
      - GB
      - IE
      - IN
      - KY
      - NZ
      - SG
      - US
  PartnerIncorporationStatus:
    type: string
    description: Current lifecycle status for the incorporation.
    enum:
      - collecting_information
      - ready_for_review
      - in_progress
      - completed
  PartnerIncorporationCountryOptions:
    type: object
    description: Country-specific incorporation options. Use the jurisdiction catalog for the currently supported fields and values.
    additionalProperties: true
    example:
      state: DE
      corporationType: LLC
  PartnerCreateCompanyScopedIncorporationRequest:
    type: object
    required:
      - country
      - countryOptions
    properties:
      country:
        $ref: "./affiliate-incorporation.yaml#/schemas/PartnerIncorporationCountry"
      countryOptions:
        $ref: "./affiliate-incorporation.yaml#/schemas/PartnerIncorporationCountryOptions"
      intake:
        type: object
        description: Optional initial partial intake data.
        properties:
          requirements:
            $ref: "./affiliate-incorporation.yaml#/schemas/PartnerIncorporationRequirementValues"
  PartnerRequirementsResponse:
    type: object
    required:
      - requirements
    properties:
      requirements:
        $ref: "./affiliate-incorporation.yaml#/schemas/PartnerIncorporationRequirements"
  PartnerJurisdictionCatalogField:
    type: object
    required:
      - key
      - type
      - required
    properties:
      key:
        type: string
        description: Key to send inside `countryOptions`.
        example: corporationType
      type:
        type: string
        enum:
          - select
        example: select
      required:
        type: boolean
        example: true
      options:
        type: array
        description: Accepted values for this field.
        items:
          type: string
        example:
          - CORPORATION
          - LLC
  PartnerJurisdictionCatalogCountry:
    type: object
    required:
      - country
      - fields
    properties:
      country:
        $ref: "./affiliate-incorporation.yaml#/schemas/PartnerIncorporationCountry"
      fields:
        type: array
        items:
          $ref: "./affiliate-incorporation.yaml#/schemas/PartnerJurisdictionCatalogField"
  PartnerJurisdictionCatalogResponse:
    type: object
    required:
      - countries
    properties:
      countries:
        type: array
        items:
          $ref: "./affiliate-incorporation.yaml#/schemas/PartnerJurisdictionCatalogCountry"
  PartnerIncorporationRequirements:
    type: object
    description: Requirements DSL for the selected incorporation. Clients can use this to render their own intake UI, but intake updates are always validated against the current server-side DSL.
    additionalProperties: true
    example:
      schemaVersion: "2026-04-22"
      dslVersion: mvp-2026-04-22
      key: sg.private_limited_company
      country: SG
      countryOptions:
        corporationType: PRIVATE_LIMITED_COMPANY
      name: Singapore Private Limited Company Incorporation Requirements
      blocks:
        - key: companyNames
          name: Company name options
  PartnerIncorporationValidationIssue:
    type: object
    required:
      - path
      - message
    properties:
      path:
        type: string
        description: Dot/bracket path for the missing or invalid requirement.
        example: documents.passportScans
      message:
        type: string
        example: Passport scans is required
  PartnerIncorporationValidationSummary:
    type: object
    required:
      - isComplete
      - missingRequirements
      - invalidRequirements
    properties:
      isComplete:
        type: boolean
        description: True when the current intake state satisfies the current requirements DSL.
        example: false
      missingRequirements:
        type: array
        items:
          $ref: "./affiliate-incorporation.yaml#/schemas/PartnerIncorporationValidationIssue"
      invalidRequirements:
        type: array
        items:
          $ref: "./affiliate-incorporation.yaml#/schemas/PartnerIncorporationValidationIssue"
  PartnerIncorporationRequirementValues:
    type: object
    description: Partner-submitted requirement values keyed by DSL field keys.
    additionalProperties: true
    example:
      companyNameOptions:
        - name: Acme SG Pte Ltd
        - name: Acme Asia Pte Ltd
        - name: Acme Global Pte Ltd
      registeredAddressMode: standardAddress
      passportScans:
        - fileId: 456
      utilityBills:
        - fileId: 789
  PartnerUpdateIntakeRequest:
    type: object
    required:
      - requirements
    properties:
      requirements:
        $ref: "./affiliate-incorporation.yaml#/schemas/PartnerIncorporationRequirementValues"
  PartnerIncorporationIntakeState:
    type: object
    required:
      - id
      - incorporationId
      - currentState
      - validation
      - createdAt
      - updatedAt
    properties:
      id:
        type: string
        example: state_123
      incorporationId:
        type: string
        example: sr_123
      currentState:
        $ref: "./affiliate-incorporation.yaml#/schemas/PartnerIncorporationRequirementValues"
      validation:
        $ref: "./affiliate-incorporation.yaml#/schemas/PartnerIncorporationValidationSummary"
      createdAt:
        type: string
        format: date-time
      updatedAt:
        type: string
        format: date-time
  PartnerIncorporationIntakeResponse:
    type: object
    required:
      - intakeState
      - requirements
    properties:
      intakeState:
        $ref: "./affiliate-incorporation.yaml#/schemas/PartnerIncorporationIntakeState"
      requirements:
        $ref: "./affiliate-incorporation.yaml#/schemas/PartnerIncorporationRequirements"
  PartnerRegisterFileRequest:
    type: object
    required:
      - fileId
    properties:
      fileId:
        type: integer
        description: Existing Commenda file id to link to this incorporation.
        example: 456
  PartnerRegisterFileResponse:
    type: object
    required:
      - file
    properties:
      file:
        type: object
        required:
          - fileId
          - fileName
        properties:
          fileId:
            type: integer
            example: 456
          fileName:
            type: string
            example: passport.pdf
          mimeType:
            type: string
            example: application/pdf
          fileSize:
            type: integer
            example: 123456
  PartnerIncorporation:
    type: object
    required:
      - id
      - serviceRequestId
      - companyId
      - country
      - countryOptions
      - incorporationStatus
      - createdAt
      - updatedAt
      - corporationId
    properties:
      id:
        type: string
        description: Incorporation identifier.
        example: 0f9a8f5e-7f7c-4c1b-a60a-b1022f9d8c91
      serviceRequestId:
        type: string
        description: Temporary bridge/debugging field. Use `id` as the primary incorporation identifier.
        example: sr_123
      companyId:
        type: integer
        description: Company that owns the incorporation.
        example: 77
      country:
        $ref: "./affiliate-incorporation.yaml#/schemas/PartnerIncorporationCountry"
      countryOptions:
        $ref: "./affiliate-incorporation.yaml#/schemas/PartnerIncorporationCountryOptions"
      incorporationStatus:
        $ref: "./affiliate-incorporation.yaml#/schemas/PartnerIncorporationStatus"
      createdAt:
        type: string
        format: date-time
        example: 2026-04-21T17:10:00.000Z
      updatedAt:
        type: string
        format: date-time
        example: 2026-04-21T17:10:00.000Z
      corporationId:
        type: integer
        nullable: true
        description: Commenda corporation/entity id once one is attached.
        example: 44
  PartnerIncorporationResponse:
    type: object
    required:
      - incorporation
    properties:
      incorporation:
        $ref: "./affiliate-incorporation.yaml#/schemas/PartnerIncorporation"
      requirements:
        $ref: "./affiliate-incorporation.yaml#/schemas/PartnerIncorporationRequirements"
      intakeState:
        $ref: "./affiliate-incorporation.yaml#/schemas/PartnerIncorporationIntakeState"
  PartnerIncorporationListResponse:
    type: object
    required:
      - incorporations
      - count
    properties:
      incorporations:
        type: array
        items:
          $ref: "./affiliate-incorporation.yaml#/schemas/PartnerIncorporation"
      count:
        type: integer
        description: Total matching incorporations before pagination.
        example: 1
